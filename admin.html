<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>LFS Admin - Auto Sync</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: #0d1b2a; 
            color: #e0e1dd; 
            padding: 20px; font-size: 14px; 
        }
        .admin-container { max-width: 450px; margin: auto; }
        .card { 
            background: #1b263b; 
            padding: 20px; 
            border-radius: 12px; 
            margin-bottom: 20px; 
            border: 1px solid #415a77; 
        }
        h2 { color: #38bdf8; font-size: 1rem; margin-top: 0; border-bottom: 1px solid #415a77; padding-bottom: 8px; }
        .row { display: flex; gap: 10px; margin-top: 10px; }
        .input-group { flex: 1; }
        label { display: block; margin-bottom: 5px; color: #94a3b8; font-size: 11px; font-weight: bold; }
        input { 
            background: #0d1b2a; 
            border: 2px solid #415a77; 
            color: #fff; 
            padding: 10px; 
            border-radius: 6px; 
            width: 100%; 
            box-sizing: border-box; 
            font-size: 18px; 
            outline: none;
        }
        input:focus { border-color: #38bdf8; }
        input.link-input { font-size: 12px; }
        .status { text-align: center; font-size: 10px; color: #2a9d8f; font-weight: bold; margin-bottom: 15px; letter-spacing: 1px; }
        .hint { font-size: 10px; color: #64748b; margin-top: 5px; font-style: italic; }
    </style>
</head>
<body>

<div class="admin-container">
    <div class="status">● PANEL KONTROL AKTIF</div>
    
    <div class="card" style="border-top: 4px solid #ff4d4d;">
        <h2>UPDATE PEMANGGILAN</h2>
        <div class="row">
            <div class="input-group">
                <label>EVENT</label>
                <input type="number" id="p-ev" placeholder="001" oninput="pushData()">
            </div>
            <div class="input-group">
                <label>SERI</label>
                <input type="number" id="p-sr" placeholder="01" oninput="pushData()">
            </div>
        </div>
    </div>

    <div class="card" style="border-top: 4px solid #4ade80;">
        <h2>UPDATE SEDANG BERTANDING</h2>
        <div class="row">
            <div class="input-group">
                <label>EVENT</label>
                <input type="number" id="t-ev" placeholder="001" oninput="pushData()">
            </div>
            <div class="input-group">
                <label>SERI</label>
                <input type="number" id="t-sr" placeholder="01" oninput="pushData()">
            </div>
        </div>
    </div>

    <div class="card">
        <h2>LINK DOKUMEN & FOLDER</h2>
        <label>Buku Acara (File PDF GDrive)</label>
        <input type="text" id="l-buku" class="link-input" oninput="pushData()" placeholder="Tempel link file di sini...">
        
        <br><br>
        
        <label>Result (Link Folder GDrive)</label>
        <input type="text" id="l-result" class="link-input" oninput="pushData()" placeholder="Tempel link folder di sini...">
        <div class="hint">* Folder memungkinkan penonton melihat banyak file sekaligus.</div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAqNqvihY0k_-YS_dyeGqAq4uA7SaSRxCg",
        authDomain: "lfs-kkg-pjok.firebaseapp.com",
        databaseURL: "https://lfs-kkg-pjok-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "lfs-kkg-pjok",
        storageBucket: "lfs-kkg-pjok.firebasestorage.app",
        messagingSenderId: "17334776597",
        appId: "1:17334776597:web:e0db6fa6d95f9ffc4def1c",
        measurementId: "G-P6H7P4L5XF"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // Mengambil data awal dari database agar input tidak kosong saat refresh
    db.ref("scoreboard").once("value", (snapshot) => {
        const data = snapshot.val();
        if(data) {
            document.getElementById('p-ev').value = data.p_ev || "";
            document.getElementById('p-sr').value = data.p_sr || "";
            document.getElementById('t-ev').value = data.t_ev || "";
            document.getElementById('t-sr').value = data.t_sr || "";
            document.getElementById('l-buku').value = data.link_buku || "";
            document.getElementById('l-result').value = data.link_result || "";
        }
    });

    function pushData() {
        db.ref("scoreboard").update({
            p_ev: document.getElementById('p-ev').value || "000",
            p_sr: document.getElementById('p-sr').value || "00",
            t_ev: document.getElementById('t-ev').value || "000",
            t_sr: document.getElementById('t-sr').value || "00",
            link_buku: document.getElementById('l-buku').value || "",
            link_result: document.getElementById('l-result').value || ""
        });
    }
</script>
</body>
</html>
